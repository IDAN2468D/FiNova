name: Continuous Integration (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Compiler Check
      run: npx tsc --noEmit

    - name: Run ESLint
      run: npm run lint

    - name: Build Next.js
      run: npm run build
      env:
        # Dummy variable structure for CI builds
        NEXTAUTH_SECRET: ci_secret_key
        MONGODB_URI: mongodb://localhost:27017/test
